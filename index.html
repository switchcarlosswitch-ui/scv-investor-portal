<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silicon Corridor Ventures - Investor Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6B3FA0;
            --purple-dark: #4A2570;
            --sky: #4AABCF;
            --teal: #3BBFAD;
            --grad: linear-gradient(135deg, #6B3FA0 0%, #4AABCF 50%, #3BBFAD 100%);
            --light: #F7F8FC;
            --white: #fff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --success: #2d7a4f;
            --warning: #b45309;
            --danger: #991b1b;
            --shadow: 0 4px 20px rgba(107, 63, 160, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: var(--grad);
            color: white;
            padding: 1rem 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
        }

        .logo-text p {
            font-size: 0.875rem;
            opacity: 0.9;
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .lang-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            color: var(--purple-dark);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(107, 63, 160, 0.1);
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--grad);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(107, 63, 160, 0.3);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .alert-warning {
            background: #fffbeb;
            border: 1px solid #fde68a;
            color: #92400e;
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }

        .alert-info {
            background: #f0f4ff;
            border: 1px solid #c7d2fe;
            color: #3730a3;
        }

        .hidden {
            display: none !important;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0 1rem;
            }
            .main-content {
                padding: 1rem;
            }
            .auth-container {
                margin: 2rem auto;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6B3FA0;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#4AABCF;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#3BBFAD;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <polygon points="50,10 80,30 80,70 50,90 20,70 20,30" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
                        <polygon points="50,20 70,35 70,65 50,80 30,65 30,35" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                        <polygon points="50,30 60,40 60,60 50,70 40,60 40,40" fill="url(#logoGrad)"/>
                        <line x1="20" y1="30" x2="10" y2="20" stroke="url(#logoGrad)" stroke-width="2"/>
                        <line x1="80" y1="30" x2="90" y2="20" stroke="url(#logoGrad)" stroke-width="2"/>
                        <line x1="80" y1="70" x2="90" y2="80" stroke="url(#logoGrad)" stroke-width="2"/>
                        <line x1="20" y1="70" x2="10" y2="80" stroke="url(#logoGrad)" stroke-width="2"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1 data-en="Silicon Corridor Ventures" data-es="Silicon Corridor Ventures">Silicon Corridor Ventures</h1>
                    <p data-en="Investor Portal" data-es="Portal de Inversores">Investor Portal</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="lang-toggle" onclick="toggleLanguage()">
                    <span id="langText">ES</span>
                </button>
                <button id="logoutBtn" class="btn btn-secondary hidden" onclick="logout()">
                    <span data-en="Logout" data-es="Cerrar Sesión">Logout</span>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="authContainer" class="auth-container">
            <div class="auth-header">
                <h2 data-en="Investor Login" data-es="Inicio de Sesión de Inversor">Investor Login</h2>
                <p data-en="Access your secure investor portal" data-es="Acceda a su portal seguro de inversores">Access your secure investor portal</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label data-en="Email" data-es="Correo Electrónico">Email</label>
                    <input type="email" class="form-input" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label data-en="Password" data-es="Contraseña">Password</label>
                    <input type="password" class="form-input" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span data-en="Sign In" data-es="Iniciar Sesión">Sign In</span>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <p style="color: var(--muted); font-size: 0.875rem;" data-en="New investor? You must be invited by an admin to create an account." data-es="¿Nuevo inversor? Debe ser invitado por un administrador para crear una cuenta.">
                    New investor? You must be invited by an admin to create an account.
                </p>
            </div>
        </div>
    </main>

    <script>
        // Configuration - Replace with your actual credentials
        const SUPABASE_URL = 'https://wrojhaduvtpilxdmqryp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indyb2poYWR1dnRwaWx4ZG1xcnlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNjc1MzUsImV4cCI6MjA4NzY0MzUzNX0.m4JIw30ZKq7gKYSfSx6mO6aAiuLChw4FuNWellzEuIg';
        const BREVO_API_KEY = 'xsmtpsib-df2a512668b09de083e05462c3df6d0dd3d7d9d2da4f8214fd8e17f8d8e741d4-gp66ve4zDpxyKwbD';

        // Language Management
        let currentLanguage = 'en';

        // Toggle Language Function
        function toggleLanguage() {
            console.log('toggleLanguage called - current language:', currentLanguage);
            currentLanguage = currentLanguage === 'en' ? 'es' : 'en';
            updateLanguage();
            document.getElementById('langText').textContent = currentLanguage === 'en' ? 'ES' : 'EN';
            showNotification(
                currentLanguage === 'en' ? 'Language changed to English' : 'Idioma cambiado a Español',
                'success',
                2000
            );
        }

        // Update Language Function
        function updateLanguage() {
            console.log('Updating language to:', currentLanguage);
            const elements = document.querySelectorAll('[data-en][data-es]');
            console.log('Found', elements.length, 'elements to translate');
            
            elements.forEach(element => {
                const text = element.getAttribute(`data-${currentLanguage}`);
                if (text) {
                    if (element.tagName === 'INPUT' && element.type !== 'submit') {
                        element.placeholder = text;
                    } else if (element.tagName === 'OPTION') {
                        element.textContent = text;
                    } else {
                        element.textContent = text;
                    }
                }
            });
        }

        // Show Notification Function
        function showNotification(message, type = 'info', duration = 5000) {
            console.log('Showing notification:', message, type);
            const notification = document.createElement('div');
            notification.className = `alert alert-${type}`;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 10000;
                min-width: 300px;
                max-width: 500px;
                animation: slideIn 0.3s ease-out;
                cursor: pointer;
            `;
            
            const icon = type === 'success' ? '✅' : 
                        type === 'warning' ? '⚠️' : 
                        type === 'danger' ? '❌' : 'ℹ️';
            
            notification.innerHTML = `
                <span style="font-size: 1.2rem; margin-right: 0.5rem;">${icon}</span>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" style="background: none; border: none; font-size: 1.2rem; margin-left: auto; cursor: pointer;">×</button>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, duration);
        }

        // Logout Function
        function logout() {
            showNotification('Logout functionality', 'info');
        }

        // Test Function
        function testJS() {
            console.log('JavaScript is working!');
            showNotification('JavaScript test successful!', 'success');
            return 'JS Working!';
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing...');
            
            // Test JavaScript
            console.log('Testing JavaScript functions...');
            testJS();
            
            // Initialize language
            updateLanguage();
            
            // Show welcome message
            setTimeout(() => {
                showNotification('Welcome to Silicon Corridor Ventures!', 'info', 3000);
            }, 1000);
            
            console.log('Initialization complete');
        });

        // Make functions globally available for debugging
        window.toggleLanguage = toggleLanguage;
        window.showNotification = showNotification;
        window.testJS = testJS;
        window.updateLanguage = updateLanguage;
        
        console.log('All JavaScript functions loaded');
    </script>
</body>
</html>
